name: KnitNote
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
    watchOS: "11.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
targets:
  KnitNote:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: KnitNote
      - path: Sources/KnitNoteCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.KnitNote
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        PRODUCT_NAME: KnitNote
        INFOPLIST_KEY_CFBundleDisplayName: KnitNote
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.lifestyle
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
  KnitNoteWatch:
    type: application
    platform: watchOS
    sources:
      - path: KnitNoteWatch
      - path: Sources/KnitNoteCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.KnitNote.watch
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        PRODUCT_NAME: KnitNote
        INFOPLIST_KEY_CFBundleDisplayName: KnitNote
schemes:
  KnitNote:
    build:
      targets:
        KnitNote: all
    run:
      config: Debug
  KnitNoteWatch:
    build:
      targets:
        KnitNoteWatch: all
    run:
      config: Debug
