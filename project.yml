name: KnitNote
options:
  bundleIdPrefix: com.phillon
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
    watchOS: "11.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 9CFPAUL5N5
targets:
  KnitNote:
    type: application
    supportedDestinations: [iOS, macOS]
    info:
      path: KnitNote/Info.plist
      properties:
        CFBundleDisplayName: KnitNote
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.lifestyle
        UILaunchStoryboardName: LaunchScreen
        NSCameraUsageDescription: Take photos for your knitting projects and journal entries.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.phillon.KnitNote.backup
            UTTypeDescription: KnitNote Backup
            UTTypeConformsTo:
              - com.apple.package
            UTTypeTagSpecification:
              public.filename-extension:
                - knitnote-backup
    sources:
      - path: KnitNote
        excludes:
          - LaunchScreen.storyboard
          - Localization/InfoPlist.xcstrings
          - PrivacyInfo.xcprivacy
      - path: KnitNote/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: KnitNote/Localization/InfoPlist.xcstrings
        buildPhase: resources
        destinationFilters: [iOS]
      - path: KnitNote/LaunchScreen.storyboard
        buildPhase: resources
        destinationFilters: [iOS]
      - path: Sources/KnitNoteCore
    dependencies:
      - target: KnitNoteWatch
        embed: true
        platformFilter: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.phillon.KnitNote
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 2
        PRODUCT_NAME: KnitNote
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  KnitNoteWatch:
    type: application
    platform: watchOS
    info:
      path: KnitNoteWatch/Info.plist
      properties:
        CFBundleDisplayName: KnitNote
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.phillon.KnitNote
    sources:
      - path: KnitNoteWatch
        excludes:
          - PrivacyInfo.xcprivacy
      - path: KnitNoteWatch/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: Sources/KnitNoteCore
        excludes:
          - Launch/LaunchExperienceCoordinator.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.phillon.KnitNote.watch
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 2
        PRODUCT_NAME: KnitNoteWatch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
schemes:
  KnitNote:
    build:
      targets:
        KnitNote: all
    run:
      config: Debug
  KnitNoteWatch:
    build:
      targets:
        KnitNoteWatch: all
    run:
      config: Debug
