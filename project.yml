name: KnitNote
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
    watchOS: "11.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 9CFPAUL5N5
targets:
  KnitNote:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: KnitNote
        excludes:
          - LaunchScreen.storyboard
          - Localization/InfoPlist.xcstrings
      - path: KnitNote/Localization/InfoPlist.xcstrings
        buildPhase: resources
        destinationFilters: [iOS]
      - path: KnitNote/LaunchScreen.storyboard
        buildPhase: resources
        destinationFilters: [iOS]
      - path: Sources/KnitNoteCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.KnitNote
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        PRODUCT_NAME: KnitNote
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        INFOPLIST_KEY_CFBundleDisplayName: KnitNote
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.lifestyle
        "INFOPLIST_KEY_UILaunchStoryboardName[sdk=iphoneos*]": LaunchScreen
        "INFOPLIST_KEY_UILaunchStoryboardName[sdk=iphonesimulator*]": LaunchScreen
        "INFOPLIST_KEY_NSCameraUsageDescription[sdk=iphoneos*]": "Take a photo for your knitting project."
        "INFOPLIST_KEY_NSCameraUsageDescription[sdk=iphonesimulator*]": "Take a photo for your knitting project."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
  KnitNoteWatch:
    type: application
    platform: watchOS
    sources:
      - path: KnitNoteWatch
      - path: Sources/KnitNoteCore
        excludes:
          - Launch/LaunchExperienceCoordinator.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.KnitNote.watch
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        PRODUCT_NAME: KnitNoteWatch
        INFOPLIST_KEY_CFBundleDisplayName: KnitNote
schemes:
  KnitNote:
    build:
      targets:
        KnitNote: all
    run:
      config: Debug
  KnitNoteWatch:
    build:
      targets:
        KnitNoteWatch: all
    run:
      config: Debug
